services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: castlefightarena
    ports:
      - 3306:3306
    volumes:
      - mysqldata:/var/lib/mysql
    restart: unless-stopped

  adminer:
    image: adminer
    ports:
      - 8080:8080
    restart: unless-stopped

volumes:
  mysqldata:
